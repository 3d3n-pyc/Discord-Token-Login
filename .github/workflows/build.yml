name: Build & Release Extension

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Create extension zip
        run: |
          zip -r discord-token-login-${{ github.ref_name }}.zip \
            manifest.json \
            dist/ \
            src/popup.html \
            src/popup.css \
            assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: discord-token-login-${{ github.ref_name }}.zip